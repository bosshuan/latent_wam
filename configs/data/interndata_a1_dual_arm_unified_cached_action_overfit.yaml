# InternData-A1 dual-arm unified-flow action-conditioning overfit smoke.
#
# This is a diagnostic for S_a / delta_cond, not the default training recipe.
# It uses the tiny cached real-latent manifest and trains longer with stronger
# counterfactual pressure to check whether action tokens can affect latent
# prediction at all.

seed: 17
device: cuda
allow_tf32: true
schema_report: reports/interndata_a1/schema_report.json
manifest_path: reports/interndata_a1/latent_cache_vjepa_vjrae_smoke_manifest.jsonl
out_path: checkpoints/interndata_a1/unified_cached_action_overfit.pt

lr: 3.0e-4
weight_decay: 0.0
total_steps: 300
log_every: 10
val_every: 20
num_val_batches: 1

data:
  batch_size: 2
  max_items: 2
  train_max_items: 2
  val_max_items: 2
  shuffle: false
  num_workers: 0

temporal:
  history_chunks: 4
  future_chunks: 4
  tubelet: 2

model:
  type: tiny
  latent_dim: 384
  action_dim: 14
  state_dim: 14
  grid_n: 144
  max_actions: 12
  num_embodiments: 2
  hidden_dim: 128
  depth: 2
  heads: 4
  max_chunks: 16
  # Tiny diagnostic DiT only. The real Wan-backed trunk has its own modulation.
  adaln_gate_init: 0.05
  # Amplify encoded action content before adding modality/position embeddings.
  action_token_scale: 2.0
  # Strong diagnostic residual bridge from same-chunk action summary into Z.
  action_latent_bridge_scale: 5.0

loss:
  lambda_z: 1.0
  # Keep action-flow present, but lower it so it does not dominate this
  # action-conditioning diagnostic.
  lambda_a: 0.1
  lambda_clean: 1.0
  lambda_cos: 1.0
  lambda_roll: 0.0
  lambda_cf: 50.0
  cf_delta: 0.05
  cf_distance: l2_token
  cf_action_mode: clean
  lambda_v: 0.0
  use_counterfactual_action: true

timestep:
  coupled: true

debug:
  grad_probe: true
