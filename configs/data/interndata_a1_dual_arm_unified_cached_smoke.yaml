# InternData-A1 dual-arm unified-flow smoke over cached VJ-RAE latents.
#
# Prerequisite:
#   bash scripts/cache_interndata_a1_dual_arm_vjepa_vjrae_latents.sh

seed: 13
device: cuda
allow_tf32: true
schema_report: reports/interndata_a1/schema_report.json
manifest_path: reports/interndata_a1/latent_cache_vjepa_vjrae_smoke_manifest.jsonl
out_path: checkpoints/interndata_a1/unified_cached_latent_smoke.pt

lr: 1.0e-4
weight_decay: 0.0
total_steps: 4
log_every: 1
val_every: 2
num_val_batches: 1

data:
  batch_size: 2
  max_items: 2
  train_max_items: 2
  val_max_items: 2
  shuffle: false
  num_workers: 0

temporal:
  history_chunks: 4
  future_chunks: 4
  tubelet: 2

model:
  type: tiny
  latent_dim: 384
  action_dim: 14
  state_dim: 14
  grid_n: 144
  max_actions: 12
  num_embodiments: 2
  hidden_dim: 128
  depth: 2
  heads: 4
  max_chunks: 16
  # Tiny smoke DiT only: keep action-token -> latent-token self-attn open from
  # initialization so S_a diagnoses the path instead of exact AdaLN-zero gates.
  adaln_gate_init: 0.05
  # Amplify encoded action content before adding modality/position embeddings.
  action_token_scale: 2.0
  # Diagnostic residual bridge from same-chunk action summary into Z tokens.
  action_latent_bridge_scale: 1.0

loss:
  lambda_z: 1.0
  lambda_a: 1.0
  lambda_clean: 1.0
  lambda_cos: 1.0
  lambda_roll: 0.0
  lambda_cf: 0.1
  cf_delta: 0.05
  cf_distance: l2_token
  lambda_v: 0.0
  use_counterfactual_action: true

timestep:
  coupled: true
