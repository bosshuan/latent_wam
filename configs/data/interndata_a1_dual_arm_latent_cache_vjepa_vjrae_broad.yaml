# Episode-balanced latent cache using the broad VJ-RAE checkpoint.

schema_report: reports/interndata_a1/schema_report.json
reader_backend: direct
device: cuda
allow_tf32: true
log_prefix: cache-broad

filter:
  embodiments: [interndata_a1_dual_arm]
  action_schema_ids: [0]

binding:
  image_key: images.rgb.head

data:
  sampling_mode: episode_balanced
  batch_size: 1
  shuffle: false
  max_batches: 4096
  max_samples_per_dataset: 2048
  max_episodes_per_dataset: 64
  samples_per_episode: 32
  episode_stride: 1
  episode_margin_frames: 64
  num_workers: 0
  pin_memory: true

temporal:
  history_chunks: 4
  future_chunks: 4
  tubelet: 2
  token_grid: [8, 24, 24]

preprocess:
  img_size: 384
  resize_mode: bilinear
  normalize: true
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

encoder:
  hub_name: vjepa2_1_vit_gigantic_384
  hub_repo: ../vjepa2
  hub_source: local
  extract_layers: [11, 23, 37, 47]
  pretrained: false
  checkpoint_path: /mnt/sfs_turbo/fyy/checkpoints/vjepa2/vjepa2_1_vitG_384.pt
  checkpoint_key: target_encoder
  checkpoint_strict: true
  assert_gigantic: true

vj_rae:
  hidden_dim: 1024
  latent_dim: 384
  pool: 2
  checkpoint_path: checkpoints/interndata_a1/vj_rae_dual_arm_broad.pt
  allow_random_vj_rae: false
  strict: true

feature_cache:
  cache_dir: ./.feature_cache/interndata_a1_dual_arm_vjepa_vjrae_broad
  manifest_path: reports/interndata_a1/latent_cache_vjepa_vjrae_broad_manifest.jsonl
  vjepa_version: vjepa2_1_vitG_384-local
  norm_version: interndata-a1-dual-arm-broad-v0
  vj_rae_version: vj-rae-dual-arm-broad-v0
  max_bytes: null
  verify_readback: true
