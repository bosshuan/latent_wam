# Fit action/state statistics on broad TRAIN episodes only.

seed: 89
schema_report: reports/interndata_a1/schema_report.json
manifest_path: reports/interndata_a1/latent_cache_vjepa_vjrae_broad_manifest.jsonl
out_path: reports/interndata_a1/control_stats_broad_train.json

data:
  batch_size: 8
  train_episode_modulus: 5
  train_episode_remainders: [0, 1, 2, 3]
  train_max_items: 4096
  train_shuffle: false
  train_drop_last: false
  num_workers: 0

temporal:
  history_chunks: 4
  future_chunks: 4
  tubelet: 2

stats:
  std_floor: 1.0e-3
