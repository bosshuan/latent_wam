# InternData-A1 dual-arm V-JEPA/VJ-RAE latent-cache smoke.
#
# This is a plumbing smoke: it reads real dual-arm robot data, runs V-JEPA and
# VJ-RAE, writes a tiny latent cache, and records a manifest. The default VJ-RAE
# is random and versioned as random-smoke so these cache files cannot collide
# with a real trained V-JEPA/VJ-RAE cache.

schema_report: reports/interndata_a1/schema_report.json
reader_backend: direct
device: cuda
allow_tf32: true

filter:
  embodiments: [interndata_a1_dual_arm]
  action_schema_ids: [0]

binding:
  image_key: images.rgb.head

data:
  batch_size: 1
  max_batches: 2
  max_samples_per_dataset: 4
  start_index: 80
  num_workers: 0
  pin_memory: true

temporal:
  history_chunks: 4
  future_chunks: 4
  tubelet: 2
  token_grid: [8, 24, 24]

preprocess:
  img_size: 384
  # First smoke keeps all camera content and accepts aspect distortion. We can
  # later compare center-crop/letterbox once cache plumbing is proven.
  resize_mode: bilinear
  normalize: true
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

encoder:
  hub_name: vjepa2_1_vit_gigantic_384
  hub_repo: ../vjepa2
  hub_source: local
  extract_layers: [11, 23, 37, 47]
  # Plumbing smoke defaults to no checkpoint download. For a real cache, set this
  # true once the target-encoder weights are available and bump vjepa_version.
  pretrained: false
  assert_gigantic: true

vj_rae:
  hidden_dim: 1024
  latent_dim: 384
  pool: 2
  checkpoint_path: null
  allow_random_vj_rae: true
  strict: true

feature_cache:
  cache_dir: ./.feature_cache/interndata_a1_dual_arm_random_smoke
  manifest_path: reports/interndata_a1/latent_cache_smoke_manifest.jsonl
  vjepa_version: vjepa2_1_vitG_384-random-smoke
  norm_version: interndata-a1-dual-arm-smoke-v0
  vj_rae_version: random-smoke-v0
  max_bytes: null
  verify_readback: true
