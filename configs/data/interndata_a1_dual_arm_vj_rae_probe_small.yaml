# Evaluate whether the current small VJ-RAE checkpoint preserves action signal.

seed: 31
schema_report: reports/interndata_a1/schema_report.json
reader_backend: direct
device: cuda
allow_tf32: true
log_prefix: vj-rae-probe-small

filter:
  embodiments: [interndata_a1_dual_arm]
  action_schema_ids: [0]

binding:
  image_key: images.rgb.head

data:
  batch_size: 1
  max_samples_per_dataset: 64
  start_index: 80
  num_workers: 0
  pin_memory: true

temporal:
  history_chunks: 4
  future_chunks: 4
  tubelet: 2
  token_grid: [8, 24, 24]

preprocess:
  img_size: 384
  resize_mode: bilinear
  normalize: true
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

encoder:
  hub_name: vjepa2_1_vit_gigantic_384
  hub_repo: ../vjepa2
  hub_source: local
  extract_layers: [11, 23, 37, 47]
  pretrained: false
  checkpoint_path: /mnt/sfs_turbo/fyy/checkpoints/vjepa2/vjepa2_1_vitG_384.pt
  checkpoint_key: target_encoder
  checkpoint_strict: true
  assert_gigantic: true

feature_cache:
  norm_version: interndata-a1-dual-arm-small-v0

vj_rae:
  hidden_dim: 1024
  latent_dim: 384
  pool: 2
  checkpoint_path: checkpoints/interndata_a1/vj_rae_dual_arm_small.pt
  strict: true
  probe_action_dim: 14
  probe_hidden_dim: 256

probe_eval:
  batch_size: 1
  num_workers: 0
  train_start_index: 80
  train_samples_per_dataset: 64
  val_start_index: 240
  val_samples_per_dataset: 32
  train_eval_batches: 128
  train_steps: 1000
  probe_batch_size: 256
  eval_batches: 64
  lr: 3.0e-4
  weight_decay: 0.0
  probe_hidden_dim: 256
  action_std_floor: 1.0e-3
  log_every: 100
  max_relative_mse_increase: 0.15
  min_latent_r2: 0.0
  out_json: reports/interndata_a1/vj_rae_probe_small.json
  out_md: reports/interndata_a1/vj_rae_probe_small.md
