# Diagnostic step-64 -> step-128 action-conditioning recovery.
#
# The main joint flow objectives are unchanged. The counterfactual auxiliary
# uses clean actions and a stronger weight for this short phase so the
# action-to-latent path receives an unambiguous semantic gradient.

seed: 79
allow_tf32: true
schema_report: reports/interndata_a1/schema_report.json
manifest_path: reports/interndata_a1/latent_cache_vjepa_vjrae_medium_manifest.jsonl
control_stats_path: reports/interndata_a1/control_stats_train.json

weights:
  wan_checkpoint: /mnt/sfs_turbo/fyy/checkpoints/Wan2.2-TI2V-5B

data:
  batch_size: 2
  train_start_item: 0
  train_index_modulus: 8
  train_index_remainders: [0, 1, 2, 3, 4, 5, 6]
  train_max_items: 448
  train_shuffle: true
  train_drop_last: true
  train_sampler_drop_last: true
  val_start_item: 0
  val_index_modulus: 8
  val_index_remainders: [7]
  val_max_items: 64
  val_shuffle: true
  val_drop_last: true
  val_sampler_drop_last: true
  num_workers: 0

temporal:
  history_chunks: 4
  future_chunks: 4
  tubelet: 2

model:
  type: wan
  wan_config_path: configs/model/latent_wam_dit.yaml
  wan_key_path: [wan]
  latent_dim: 384
  action_dim: 14
  state_dim: 14
  grid_hw: [12, 12]
  max_actions: 12
  num_embodiments: 2
  max_chunks: 16
  text_seq_len: 4
  action_token_scale: 2.0
  action_latent_bridge_scale: 1.0

loss:
  lambda_z: 1.0
  lambda_a: 0.2
  lambda_clean: 1.0
  lambda_cos: 1.0
  lambda_roll: 0.0
  lambda_cf: 10.0
  cf_delta: 0.05
  cf_distance: l2_token
  cf_action_mode: clean
  monitor_cf_action_mode: clean
  counterfactual_action_mode: farthest
  min_counterfactual_action_delta: 0.05
  min_counterfactual_valid_frac_for_alarm: 0.5
  lambda_v: 0.0
  use_counterfactual_action: true

timestep:
  coupled: true

optimizer:
  backbone_lr: 1.0e-6
  new_module_lr: 1.0e-4
  weight_decay: 0.0
  max_grad_norm: 1.0

pilot:
  total_steps: 128
  log_every: 4
  val_every: 16
  eval_seed: 2201
  max_final_val_total_ratio: 1.10
  min_final_action_sensitivity: 0.01
  min_final_delta_cond: -1.0e-3
  require_cf_conclusive: true
  metrics_path: reports/interndata_a1/wan_fsdp_action_recovery_128.jsonl
  checkpoint_root: checkpoints/interndata_a1/wan_fsdp_pilot
  checkpoint_backend: legacy_fsdp1
  resume_from: null

distributed:
  backend: nccl
  min_world_size: 2
  precision: bf16
  sharding_strategy: full_shard
  activation_checkpointing: true
