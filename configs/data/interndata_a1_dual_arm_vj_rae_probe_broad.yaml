# Episode-disjoint probe for the broad VJ-RAE checkpoint.

seed: 47
schema_report: reports/interndata_a1/schema_report.json
reader_backend: direct
device: cuda
allow_tf32: true
log_prefix: vj-rae-probe-broad

filter:
  embodiments: [interndata_a1_dual_arm]
  action_schema_ids: [0]

binding:
  image_key: images.rgb.head

data:
  sampling_mode: episode_balanced
  batch_size: 1
  shuffle: true
  max_samples_per_dataset: 512
  max_episodes_per_dataset: 64
  samples_per_episode: 8
  episode_stride: 1
  episode_margin_frames: 64
  num_workers: 0
  pin_memory: true

temporal:
  history_chunks: 4
  future_chunks: 4
  tubelet: 2
  token_grid: [8, 24, 24]

preprocess:
  img_size: 384
  resize_mode: bilinear
  normalize: true
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

encoder:
  hub_name: vjepa2_1_vit_gigantic_384
  hub_repo: ../vjepa2
  hub_source: local
  extract_layers: [11, 23, 37, 47]
  pretrained: false
  checkpoint_path: /mnt/sfs_turbo/fyy/checkpoints/vjepa2/vjepa2_1_vitG_384.pt
  checkpoint_key: target_encoder
  checkpoint_strict: true
  assert_gigantic: true

feature_cache:
  norm_version: interndata-a1-dual-arm-broad-v0

vj_rae:
  hidden_dim: 1024
  latent_dim: 384
  pool: 2
  checkpoint_path: checkpoints/interndata_a1/vj_rae_dual_arm_broad.pt
  strict: true
  probe_action_dim: 14
  probe_hidden_dim: 256

probe_eval:
  batch_size: 1
  num_workers: 0
  train_episode_modulus: 5
  train_episode_remainders: [0, 1, 2, 3]
  val_episode_modulus: 5
  val_episode_remainders: [4]
  train_max_episodes_per_dataset: 64
  val_max_episodes_per_dataset: 32
  train_samples_per_dataset: 512
  val_samples_per_dataset: 256
  train_eval_batches: 768
  train_steps: 2000
  probe_batch_size: 256
  eval_batches: 256
  lr: 3.0e-4
  weight_decay: 0.0
  probe_hidden_dim: 256
  action_std_floor: 1.0e-3
  log_every: 100
  max_relative_mse_increase: 0.15
  min_latent_r2: 0.05
  out_json: reports/interndata_a1/vj_rae_probe_broad.json
  out_md: reports/interndata_a1/vj_rae_probe_broad.md
